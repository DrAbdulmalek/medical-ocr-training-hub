name: Sync & Build Training Data

on:
  # Triggered by ground-truth repo dispatch
  repository_dispatch:
    types: [ground-truth-updated]
  # Also on direct push to main
  push:
    branches: [main]
    paths:
      - 'training_data/**'
      - 'scripts/**'
      - 'config.yaml'
  # Manual trigger
  workflow_dispatch:
    inputs:
      direction:
        description: 'Sync direction'
        required: false
        default: 'all'
        type: choice
        options: [all, hf_to_github, github_to_hf]

jobs:
  sync-from-hf:
    name: Sync HF Space → GitHub
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.direction == 'all' ||
      github.event.inputs.direction == 'hf_to_github' ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.PAT_GITHUB }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests huggingface_hub
      - name: Sync corrections from HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -f scripts/sync_hf_github.py ]; then
            python scripts/sync_hf_github.py --direction hf_to_github || echo "Sync completed with warnings"
          else
            echo "sync_hf_github.py not found, skipping"
          fi
      - name: Build training datasets
        run: |
          if [ -f scripts/build_training_datasets.py ]; then
            python scripts/build_training_datasets.py --all || echo "Build completed with warnings"
          else
            echo "build_training_datasets.py not found, skipping"
          fi
      - name: Push updated training data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add training_data/ || true
          git diff --staged --quiet || git commit -m "chore: sync training data from HF Space [skip ci]"
          git push origin main || true

  dispatch-benchmarks:
    name: Trigger Benchmarks Evaluation
    runs-on: ubuntu-latest
    needs: sync-from-hf
    if: github.event_name == 'repository_dispatch'
    steps:
      - name: Dispatch to benchmarks repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_GITHUB }}
          repository: DrAbdulmalek/medical-ocr-benchmarks
          event-type: training-data-updated
          client-payload: |
            {
              "source": "training-hub",
              "trigger": "${{ github.event_name }}",
              "sha": "${{ github.sha }}"
            }

  dispatch-platform:
    name: Notify Platform of New Data
    runs-on: ubuntu-latest
    needs: sync-from-hf
    if: github.event_name == 'repository_dispatch'
    steps:
      - name: Dispatch to omni-medical-suite
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_GITHUB }}
          repository: DrAbdulmalek/omni-medical-suite
          event-type: training-data-updated
          client-payload: |
            {
              "source": "training-hub",
              "action": "update_correction_dict",
              "sha": "${{ github.sha }}"
            }