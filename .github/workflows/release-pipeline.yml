name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.1.0)'
        required: true
      skip_training:
        description: 'Skip training, run readiness check only'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'training_data/**'
      - 'src/**'

permissions:
  contents: write
  actions: read

jobs:
  readiness-check:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.evaluate.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests pyyaml
          fi

      - name: Create reports directory
        run: mkdir -p reports

      - name: Validate training data
        run: |
          python -c "
          import json, os, glob

          gt_files = glob.glob('training_data/ground_truth/*.jsonl')
          total_samples = 0
          for f in gt_files:
              with open(f) as fh:
                  total_samples += sum(1 for _ in fh)

          result = {
              'ground_truth_files': len(gt_files),
              'total_samples': total_samples,
              'min_samples_threshold': 100,
              'data_check': 'PASS' if total_samples >= 100 else 'FAIL',
              'files': [os.path.basename(f) for f in gt_files]
          }

          with open('reports/readiness.json', 'w') as out:
              json.dump(result, out, indent=2)

          print(f'Total samples: {total_samples}')
          print(f'Data check: {result[\"data_check\"]}')
          "

      - name: Run test suite
        run: |
          if [ -f tests/test_pipeline_v2.py ]; then
            pip install pytest
            pytest tests/test_pipeline_v2.py -v --tb=short 2>&1 | tee reports/test_results.txt
          else
            echo 'No tests found — skipping' > reports/test_results.txt
          fi

      - name: Evaluate readiness
        id: evaluate
        run: |
          python -c "
          import json
          from datetime import datetime, timezone

          with open('reports/readiness.json') as f:
              data = json.load(f)

          data_check = data.get('data_check', 'FAIL')
          total = data.get('total_samples', 0)

          # Read test results
          test_passed = True
          if __import__('os').path.exists('reports/test_results.txt'):
              with open('reports/test_results.txt') as f:
                  content = f.read()
                  if 'failed' in content.lower():
                      test_passed = False

          # Determine status
          if data_check == 'PASS' and test_passed:
              status = 'PASS'
              recommendation = 'RELEASE'
          elif data_check == 'FAIL' and not test_passed:
              status = 'FAIL'
              recommendation = 'REJECT'
          else:
              status = 'HOLD'
              recommendation = 'HOLD'

          version = '${{ github.event.inputs.version || \"snapshot\" }}'
          timestamp = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')
          run_id = '${{ github.run_id }}'
          commit_sha = '${{ github.sha }}'[:8]

          report = f'''# Readiness Report — v{version}

**Generated:** {timestamp}
**Pipeline Run:** {run_id}
**Training Commit:** {commit_sha}

---

## Overall Result: {recommendation}

## Data Validation

| Check | Value | Threshold | Status |
|-------|-------|-----------|--------|
| Ground Truth Files | {data.get('ground_truth_files', 0)} | ≥ 1 | {data_check} |
| Total Samples | {total} | ≥ 100 | {data_check} |
| Test Suite | {'Passed' if test_passed else 'Failed'} | All pass | {'PASS' if test_passed else 'FAIL'} |

## Ground Truth Files

{chr(10).join(f'- {f}' for f in data.get('files', []))}

## Recommendation

**{recommendation}**

- Data validation: {data_check}
- Tests: {'PASS' if test_passed else 'FAIL'}
- Overall pipeline status: {status}

---

*Report generated by release-pipeline.yml — {timestamp}*
'''

          with open('reports/readiness_report.md', 'w') as f:
              f.write(report)

          print(f'STATUS={status}')
          print(f'RECOMMENDATION={recommendation}')
          "

          # Set output for downstream jobs
          STATUS=$(python -c "import json; d=json.load(open('reports/readiness.json')); print('PASS' if d.get('data_check')=='PASS' else 'FAIL')")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Upload readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readiness-report
          path: |
            reports/readiness_report.md
            reports/readiness.json
            reports/test_results.txt

      - name: Fail if not ready
        if: steps.evaluate.outputs.status == 'FAIL'
        run: |
          echo '::error::Readiness check FAILED — see readiness_report.md for details'
          exit 1
