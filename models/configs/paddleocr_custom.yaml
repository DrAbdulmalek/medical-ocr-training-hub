# PaddleOCR Custom Configuration for Medical Handwriting
# Training data reference: training_data/word_crops/
# Ground truth reference: training_data/ground_truth/

global:
  # Custom medical dictionary built from training hub corrections
  use_pdc_v2: true
  use_space_char: true
  det_db_shrink_ratio: 0.5
  det_db_box_thresh: 0.4
  det_db_unclip_ratio: 1.6

# Detection model — use standard Arabic+English
det_model:
  name: "PP-OCRv4"
  lang: "ar"
  det_model_dir: null  # uses default pretrained
  rec_model_dir: null  # uses default pretrained

# Recognition model customizations
rec_model:
  name: "PP-OCRv4"
  lang: "ar"
  # Custom character dictionary will be generated from:
  #   training_data/word_crops/corrections_*.jsonl
  # Characters are extracted from corrected_text fields
  custom_dict_path: "models/configs/paddleocr_custom_dict.txt"

# Post-processing — built from correction patterns
postprocess:
  # Auto-correction patterns from training hub
  # Generated by: scripts/build_correction_dict.py
  correction_patterns_file: "training_data/exports/paddleocr_custom/correction_patterns.json"
  min_confidence_for_auto_correct: 0.95  # Only auto-correct high-confidence patterns
  fuzzy_match_threshold: 0.85

# Training configuration (when enough data is collected)
training:
  enabled: false
  min_samples: 200
  base_model: "PaddleOCR/ppocr_v4"
  epochs: 50
  learning_rate: 0.0001
  batch_size: 16
  train_data_ref: "training_data/exports/paddleocr_custom"
  eval_data_ref: "training_data/ground_truth"